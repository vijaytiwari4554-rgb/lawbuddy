<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LawBuddy – India's Legal Learning Platform | LLB Notes, Bare Acts & Case Laws</title>
    
    <!-- Theme Initializer to prevent flickering before bundle load -->
    <script>
      (function() {
        try {
          const saved = localStorage.getItem("theme");
          if (saved === "dark" || saved === null) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    
    <!-- PWA & Mobile Web App Capabilities -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="theme-color" content="#0B1220" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LawBuddy" />
    
    <!-- Primary Meta Tags -->
    <meta name="title" content="LawBuddy – India's Legal Learning Platform | LLB Notes, Bare Acts & Case Laws" />
    <meta name="description" content="Access syllabus-aligned LLB notes, previous year question papers, landmark Supreme Court case ratio analyses, and Bare Act indexes. Your trusted digital advocate companion." />
    <meta name="keywords" content="LawBuddy, LLB notes, Mumbai University LLB, Delhi University Law, Bare Acts India, landmark case law Supreme Court, BNS 2023, India legal learning" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="LawBuddy India Team" />
    
    <!-- Open Graph / Facebook -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
      .gold-gradient-text {
        background-image: linear-gradient(135deg, #FFF 0%, #D4AF37 50%, #F3E5AB 100%) !important;
